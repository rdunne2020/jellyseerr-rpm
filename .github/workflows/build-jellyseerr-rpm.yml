name: Build Jellyseerr RPMs

# TODO Get this right
on:
  push:
    paths:
      - .github/workflows/build-jellyseerr-rpm.yml
      - seerr.spec
  # Manually run if need be
  workflow_dispatch:

concurrency:
  group: jellyseerr-rpmbuild
  cancel-in-progress: false

jobs:
  # Job ID rpm-build
  rpm-build:
    strategy:
      matrix:
        fedora-version: [42, 43]
    # Spin up ubuntu runner and install Earthly on it
    name: Fedora ${{ matrix.fedora-version }} Jellyseerr Build
    runs-on: ubuntu-latest
    # container:
    #   image: fedora:${{ matrix.fedora-version }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Install EarthBuild
        uses: EarthBuild/actions-setup@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: "latest"
      - name: Clone Repo
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.BOT_DEPLOY_KEY }}

      - name: Configure Git
        run: |
          git config --global user.name "Seerr Bot"
          git config --global user.email "seerr-builder@rpm.com"

      - name: Run the Earthly build
        env:
          FORCE_COLOR: true
          EARTHLY_CI: true

        run: earth -a +build-rpm/*

      - name: Set Version Number in Github Env
        run: |
          VER=v$(grep "Version" seerr.spec | awk '{print $2}')
          echo "VERSION=${VER}" >> $GITHUB_ENV

      #- name: Switch to the branch we want to release from and create a tag for the release version, this should be pulled from the spec file
      # - name: Create tag for version number to release to
      #   run: |
      #     chown root:root .
      #     git fetch
      #     git tag ${{ env.VERSION }}
      #     git remote -v
      #     git push origin ${{ env.VERSION }}

      - name: Upload RPM to Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.VERSION }}
          commit: main
          # Earthly should save the artifact into CWD
          artifacts: "./*.rpm"
          skipIfReleaseExists: true
